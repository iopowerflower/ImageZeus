name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish
        shell: cmd
        run: |
          dotnet publish ImageViewer.App\ImageViewer.App.csproj ^
            -c Release -r win-x64 --self-contained true ^
            -o publish ^
            -p:PublishSingleFile=true ^
            -p:IncludeNativeLibrariesForSelfExtract=true ^
            -p:PublishTrimmed=true ^
            -p:TrimMode=partial
          copy /y zeusicon.ico publish\zeusicon.ico
          copy /y zeusicon.png publish\zeusicon.png

      - name: Build installer
        shell: cmd
        run: |
          choco install innosetup --no-progress -y
          iscc installer\ImageZeus.iss /DMyAppVersion=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImageZeus ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: installer_output/ImageZeusSetup.exe
